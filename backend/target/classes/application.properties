# ── Server ──────────────────────────────────────────────────
server.port=8080

# ── MySQL ────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/leoni_billing?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=LeoniBillingSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
app.jwt.expiration-ms=86400000

# ── ML Flask API ─────────────────────────────────────────────
app.ml.url=http://localhost:5000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:4200

# ── Logging ─────────────────────────────────────────────────
logging.level.com.leoni=DEBUG
logging.level.org.springframework.security=WARN
