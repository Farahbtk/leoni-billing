<div class="app-shell" [class.collapsed]="sidebarCollapsed">
  <app-sidebar
    [collapsed]="sidebarCollapsed"
    (collapseToggle)="toggleSidebar()"
  ></app-sidebar>

  <div class="main-wrapper">
    <header class="top-bar">
      <span class="top-spacer"></span>
      <button mat-icon-button class="theme-toggle" (click)="theme.toggle()"
              [matTooltip]="theme.isDark ? 'Switch to light mode' : 'Switch to dark mode'"
              matTooltipPosition="below">
        <mat-icon>{{ theme.isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </header>

    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
