<nav class="sidebar" [class.collapsed]="collapsed">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <mat-icon>electric_bolt</mat-icon>
    </div>
    <div class="logo-text" *ngIf="!collapsed">
      <span class="logo-name">LEONI</span>
      <span class="logo-sub">Billing Dashboard</span>
    </div>
    <button class="collapse-btn" (click)="collapseToggle.emit()" [matTooltip]="collapsed ? 'Expand' : 'Collapse'">
      <mat-icon>{{ collapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
    </button>
  </div>

  <!-- Nav section label -->
  <div class="nav-section-label" *ngIf="!collapsed">MAIN MENU</div>

  <!-- Nav Items -->
  <ul class="nav-list">
    <li *ngFor="let item of navItems">
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        matRipple
        [matRippleColor]="'rgba(255,255,255,0.08)'"
        class="nav-item"
        [matTooltip]="collapsed ? item.label : ''"
        matTooltipPosition="right"
      >
        <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
        <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
        <span class="nav-badge" *ngIf="item.badge && !collapsed">{{ item.badge }}</span>
        <span class="nav-badge-dot" *ngIf="item.badge && collapsed"></span>
      </a>
    </li>
  </ul>

  <!-- Tools Section -->
  <div class="nav-section">
    <div class="nav-section-title" *ngIf="!collapsed">TOOLS</div>
    <button
      class="nav-item powerapps-btn"
      (click)="openPowerApps()"
      matRipple
      [matRippleColor]="'rgba(103,80,164,0.15)'"
      [matTooltip]="collapsed ? 'Power Apps Portal' : ''"
      matTooltipPosition="right"
    >
      <mat-icon class="nav-icon">grid_view</mat-icon>
      <span class="nav-label" *ngIf="!collapsed">Power Apps Portal</span>
      <mat-icon class="ext-icon" *ngIf="!collapsed">open_in_new</mat-icon>
    </button>
  </div>

  <!-- Bottom Section -->
  <div class="sidebar-bottom">
    <!-- Settings -->
    <a [routerLink]="'/settings'" routerLinkActive="active" matRipple
       [matRippleColor]="'rgba(255,255,255,0.08)'" class="nav-item settings-item"
       [matTooltip]="collapsed ? 'Settings' : ''" matTooltipPosition="right">
      <mat-icon class="nav-icon">settings</mat-icon>
      <span class="nav-label" *ngIf="!collapsed">Settings</span>
    </a>
    <div class="sidebar-divider"></div>
    <div class="nav-section-label" *ngIf="!collapsed">ACCOUNT</div>

    <div class="user-info" *ngIf="!collapsed">
      <div class="user-avatar">{{ displayName[0]?.toUpperCase() }}</div>
      <div class="user-details">
        <span class="user-name">{{ displayName }}</span>
        <span class="user-role">{{ roleLabel }}</span>
      </div>
    </div>

    <button class="nav-item logout-btn" (click)="logout()" matRipple
            [matTooltip]="collapsed ? 'Logout' : ''" matTooltipPosition="right">
      <mat-icon class="nav-icon">logout</mat-icon>
      <span class="nav-label" *ngIf="!collapsed">Logout</span>
    </button>
  </div>
</nav>
